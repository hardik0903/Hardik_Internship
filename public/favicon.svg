<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Graduation cap base (represents FOSSEE education focus) -->
  <defs>
    <linearGradient id="cap-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6c63ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Cap top -->
  <polygon points="24,6 4,18 24,30 44,18" fill="url(#cap-grad)" />
  <!-- Cap brim shadow -->
  <polygon points="24,30 44,18 44,22 24,34 4,22 4,18" fill="#1a1a2e" opacity="0.3" />
  <!-- Tassel string -->
  <line x1="38" y1="18" x2="38" y2="34" stroke="#e94560" stroke-width="2" stroke-linecap="round" />
  <!-- Tassel end -->
  <circle cx="38" cy="36" r="3" fill="#e94560" />
  <!-- Cap body sides -->
  <path d="M12,22 L12,32 Q24,40 36,32 L36,22 L24,30 Z" fill="url(#cap-grad)" opacity="0.85" />
</svg>